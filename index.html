<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ESCUDERO SELENE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}

/* PORTADA */
.portada{
height:90vh;
background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.portada h1{font-size:40px}

/* BOTONES */
.btn{
background:#00c853;
padding:10px 18px;
border:none;
color:#fff;
cursor:pointer;
border-radius:6px;
}

/* GALERIA */
.galerias{padding:20px}
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:8px;
}
.grid img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

/* PANEL */
.panel-btn{
position:fixed;
top:10px;
left:10px;
background:#111;
padding:10px;
cursor:pointer;
border-radius:6px;
}

.panel{
display:none;
position:fixed;
top:0;
left:0;
width:320px;
height:100%;
background:#111;
padding:20px;
overflow:auto;
}

input,select{
width:100%;
margin:5px 0;
padding:8px;
}

/* PROGRESO */
.barra{
height:8px;
background:#333;
border-radius:4px;
overflow:hidden;
}
.progreso{
height:100%;
width:0%;
background:#00c853;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
padding:15px;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<div class="panel-btn" onclick="abrirPanel()">⚙</div>

<div class="panel" id="panel">

<h3>Panel Fotógrafo</h3>

<input type="password" id="pass" placeholder="Contraseña">
<button class="btn" onclick="login()">Ingresar</button>

<div id="contenido" style="display:none">

<hr>

<h4>Crear Galería</h4>
<input id="nombreGaleria">
<button class="btn" onclick="crearGaleria()">Crear</button>

<hr>

<h4>Galerías</h4>
<select id="selectGaleria"></select>

<hr>

<h4>Subir fotos</h4>
<input type="file" id="files" multiple>
<button class="btn" onclick="subir()">Subir</button>

<div class="barra"><div class="progreso" id="progreso"></div></div>

</div>

</div>

<div class="portada">
<h1>ESCUDERO SELENE</h1>
<button class="btn" onclick="ir()">Ver galerías</button>
</div>

<div class="galerias" id="galerias"></div>

<div class="whatsapp" onclick="window.open('https://wa.me/5492615573928')">💬</div>

<script>

// 🔥 CONFIG CLOUDINARY
const CLOUD_NAME = "dnsol2tcf";
const PRESET = "fotografia";

// PASSWORD PANEL
function login(){
if(document.getElementById("pass").value==="Lepra1913"){
document.getElementById("contenido").style.display="block";
cargarSelect();
}else alert("Incorrecto");
}

// ABRIR PANEL
function abrirPanel(){
document.getElementById("panel").style.display="block";
}

// DATOS
let galerias = JSON.parse(localStorage.getItem("galerias")) || {};

// CREAR GALERIA
function crearGaleria(){
let nombre = document.getElementById("nombreGaleria").value;
if(!nombre)return;

galerias[nombre]=[];
guardar();
cargarSelect();
mostrar();
}

// SELECT
function cargarSelect(){
let s=document.getElementById("selectGaleria");
s.innerHTML="";
for(let g in galerias){
let o=document.createElement("option");
o.value=g;
o.innerText=g;
s.appendChild(o);
}
}

// SUBIR A CLOUDINARY
async function subir(){
let files=document.getElementById("files").files;
let gal=document.getElementById("selectGaleria").value;
let prog=document.getElementById("progreso");

let total=files.length, subidas=0;

for(let f of files){

let formData=new FormData();
formData.append("file",f);
formData.append("upload_preset",PRESET);

let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:formData
});

let data=await res.json();

galerias[gal].push(data.secure_url);

subidas++;
prog.style.width=(subidas/total*100)+"%";

guardar();
mostrar();
}

setTimeout(()=>prog.style.width="0%",1000);
}

// GUARDAR
function guardar(){
localStorage.setItem("galerias",JSON.stringify(galerias));
}

// MOSTRAR
function mostrar(){
let cont=document.getElementById("galerias");
cont.innerHTML="";

for(let g in galerias){

let div=document.createElement("div");

div.innerHTML=`
<h3>${g}</h3>
<div class="grid">
${galerias[g].map(i=>`<img src="${i}">`).join("")}
</div>
`;

cont.appendChild(div);
}
}

// SCROLL
function ir(){
window.scrollTo({top:600,behavior:"smooth"});
}

mostrar();

</script>

</body>
</html>
