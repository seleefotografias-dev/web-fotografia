<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESCUDERO SELENE</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* BOTON PANEL */
.admin-btn{
  position:fixed;
  top:15px;
  left:15px;
  background:#111;
  padding:10px;
  cursor:pointer;
  border-radius:5px;
}

/* HEADER */
header{
  text-align:center;
  padding:60px;
}

/* CLIENTES */
.clientes{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:20px;
}

.cliente{
  background:#111;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
}

/* GALERIA */
.galeria{
  display:none;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.img-box{
  position:relative;
}

.img-box img{
  width:100%;
  border-radius:10px;
}

/* MARCA DE AGUA */
.img-box::after{
  content:"@FOTOS_SELE";
  position:absolute;
  bottom:10px;
  right:10px;
  color:rgba(255,255,255,0.5);
}

/* DESCARGAR */
.descargar{
  position:absolute;
  top:10px;
  right:10px;
  background:black;
  padding:5px;
  font-size:12px;
}

/* PANEL */
.panel{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  padding:40px;
}

input{
  padding:10px;
  margin:5px;
}

button{
  padding:10px;
  margin:5px;
  background:#25D366;
  border:none;
  color:white;
  border-radius:5px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="admin-btn" onclick="abrirPanel()">⚙</div>

<header>
<h1>ESCUDERO SELENE 📸</h1>
<p>@FOTOS_SELE</p>
</header>

<!-- CLIENTES -->
<div class="clientes">
  <div class="cliente" onclick="abrirGaleria('sofia')">15 Sofía</div>
  <div class="cliente" onclick="abrirGaleria('boda')">Boda Juan</div>
</div>

<!-- GALERIAS -->
<div id="sofia" class="galeria">
<h2>15 Sofía</h2>
<div class="grid">
  <div class="img-box">
    <a href="https://picsum.photos/1000" download>
      <div class="descargar">⬇</div>
    </a>
    <img src="https://picsum.photos/400?1">
  </div>
</div>
</div>

<div id="boda" class="galeria">
<h2>Boda</h2>
<div class="grid">
  <div class="img-box">
    <img src="https://picsum.photos/400?2">
  </div>
</div>
</div>

<!-- PANEL -->
<div id="panel" class="panel">

<h2>Panel Fotógrafo</h2>

<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>

<div id="panelContenido" style="display:none;">

<h3>Panel activo ✔</h3>

<button onclick="alert('Subida de fotos próximamente')">
📤 Subir fotos
</button>

<button onclick="alert('Crear galería próximamente')">
📁 Crear galería
</button>

<button onclick="cerrarPanel()">
❌ Cerrar panel
</button>

</div>

</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5492615573928">💬</a>

<script>
function abrirPanel(){
  document.getElementById("panel").style.display="block";
}

function cerrarPanel(){
  document.getElementById("panel").style.display="none";
}

function login(){
  let pass = document.getElementById("pass").value;

  if(pass === "Lepra1913"){
    alert("Acceso correcto ✔");
    document.getElementById("panelContenido").style.display="block";
  } else {
    alert("Contraseña incorrecta");
  }
}

function abrirGaleria(id){
  document.querySelectorAll('.galeria').forEach(g=>g.style.display='none');
  document.getElementById(id).style.display='block';
}
</script>

</body>
</html>
