<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCUDERO SELENE</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;color:#fff;font-family:Poppins}

/* HEADER */
header{
position:fixed;
top:0;width:100%;
display:flex;justify-content:space-between;
padding:20px;
background:rgba(0,0,0,0.7);
z-index:999;
}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
}

h1{font-family:Playfair Display;font-size:50px}

/* BOTONES */
.btn{
background:#25D366;
border:none;
padding:10px 20px;
border-radius:30px;
margin:5px;
cursor:pointer;
}

/* PANEL */
.panel{
position:fixed;
top:80px;
left:10px;
background:#111;
padding:15px;
border-radius:10px;
z-index:999;
}

/* GRID CLIENTES */
.grid{
padding:100px 20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

.album{
background:#111;
padding:20px;
border-radius:10px;
cursor:pointer;
}

/* FOTOS */
.fotos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
padding:20px;
}

.fotos img{
width:100%;
border-radius:8px;
cursor:pointer;
}

/* FULLSCREEN */
.viewer{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.viewer img{
max-width:90%;
max-height:80%;
}

/* PROGRESS */
.progress{
position:fixed;
bottom:0;
left:0;
height:5px;
background:#25D366;
width:0%;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
}
</style>
</head>

<body>

<header>
<div>ESCUDERO SELENE</div>
</header>

<section class="hero">
<h1>ESCUDERO SELENE</h1>
<button class="btn" onclick="verGalerias()">Ver galerías</button>
</section>

<!-- PANEL -->
<div class="panel">
<input type="password" id="pass">
<button onclick="login()">Entrar</button>

<div id="pro" style="display:none">
<button onclick="crear()">Crear álbum</button>
<input type="file" id="files" multiple>
<button onclick="subir()">Subir</button>
</div>
</div>

<!-- GALERIAS -->
<div id="galerias" class="grid"></div>

<!-- FOTOS -->
<div id="fotos" class="fotos" style="display:none"></div>

<!-- VIEWER -->
<div id="viewer" class="viewer">
<img id="imgView">
<div>
<button class="btn" onclick="descargar()">⬇ Descargar</button>
<button class="btn" onclick="fav()">❤️ Favorito</button>
<button class="btn" onclick="cerrar()">Cerrar</button>
</div>
</div>

<div class="progress" id="progress"></div>

<div class="whatsapp" onclick="wa()">💬</div>

<script>
const CLOUD = "dnsol2tcf"
const PRESET = "fotografia"

let data = JSON.parse(localStorage.getItem("data")) || {}
let actualAlbum = null
let actualImg = null

function login(){
if(pass.value==="Lepra1913"){
pro.style.display="block"
}
}

function crear(){
let nombre = prompt("Nombre cliente")
if(!nombre) return
data[nombre]=[]
guardar()
renderAlbums()
}

function subir(){
let files = document.getElementById("files").files
let album = prompt("Álbum destino")
if(!data[album]) return alert("No existe")

let progress = document.getElementById("progress")

Array.from(files).forEach((file,i)=>{
let form=new FormData()
form.append("file",file)
form.append("upload_preset",PRESET)

fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,{
method:"POST",body:form
})
.then(r=>r.json())
.then(res=>{
data[album].push(res.secure_url)
guardar()
progress.style.width=((i+1)/files.length)*100+"%"
renderAlbums()
})
})
}

function guardar(){
localStorage.setItem("data",JSON.stringify(data))
}

function renderAlbums(){
let g=document.getElementById("galerias")
g.innerHTML=""

for(let a in data){
let div=document.createElement("div")
div.className="album"
div.innerHTML=`${a} (${data[a].length})`
div.onclick=()=>abrirAlbum(a)
g.appendChild(div)
}
}

function abrirAlbum(a){
actualAlbum=a
galerias.style.display="none"
fotos.style.display="grid"
renderFotos()
}

function renderFotos(){
fotos.innerHTML=""
data[actualAlbum].forEach(url=>{
let img=document.createElement("img")
img.src=url.replace('/upload/','/upload/l_text:Arial_30:FOTOS_SELE,g_south_west,x_10,y_10/')
img.onclick=()=>ver(url)
fotos.appendChild(img)
})
}

function ver(url){
actualImg=url
viewer.style.display="flex"
imgView.src=url
}

function cerrar(){
viewer.style.display="none"
}

function descargar(){
window.open(actualImg)

let descargas = JSON.parse(localStorage.getItem("descargas")) || []
descargas.push(actualImg)
localStorage.setItem("descargas",JSON.stringify(descargas))

alert("Descarga registrada ✔")
}

function fav(){
let favs = JSON.parse(localStorage.getItem("favs")) || []
favs.push(actualImg)
localStorage.setItem("favs",JSON.stringify(favs))
alert("Agregado a favoritos ❤️")
}

function verGalerias(){
document.getElementById("galerias").scrollIntoView()
}

function wa(){
window.open("https://wa.me/5492615573928")
}

renderAlbums()
</script>

</body>
</html>
