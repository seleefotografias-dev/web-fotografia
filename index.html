<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESCUDERO SELENE</title>

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#000;
color:#fff;
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 30px;
background:rgba(0,0,0,0.5);
z-index:1000;
}

/* PANEL */
#panelLogin{
position:absolute;
top:10px;
left:10px;
z-index:2000;
}

#panel{
display:none;
margin-top:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00c853;
color:#fff;
margin:5px;
}

/* PORTADA */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:50px;
letter-spacing:3px;
}

.hero button{
background:#00c853;
}

/* GALERIAS */
#galerias{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.carpeta{
background:#111;
padding:20px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.carpeta:hover{
transform:scale(1.05);
}

/* FOTOS */
#fotos{
display:none;
padding:20px;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.foto{
position:relative;
}

.foto img{
width:100%;
border-radius:10px;
}

/* MARCA AGUA */
.marca{
position:absolute;
bottom:5px;
left:10px;
font-size:12px;
opacity:0.7;
}

/* FULLSCREEN */
#fullscreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
justify-content:center;
align-items:center;
z-index:3000;
}

#fullscreen img{
max-width:90%;
max-height:90%;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:20px;
}
</style>
</head>

<body>

<!-- PANEL -->
<div id="panelLogin">
<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>

<div id="panel">
<button onclick="crearGaleria()">Crear galería</button>
<input type="file" id="upload" multiple onchange="subirFotos(event)">
<div id="barra"></div>
</div>
</div>

<!-- NAV -->
<nav>
<div>ESCUDERO SELENE</div>
<div>Inicio</div>
</nav>

<!-- PORTADA -->
<div class="hero">
<h1>ESCUDERO SELENE</h1>
<p>@FOTOS_SELE - FOTOGRAFÍA PROFESIONAL</p>
<button onclick="scrollGalerias()">Ver galerías</button>
</div>

<!-- GALERIAS -->
<div id="galerias"></div>

<!-- FOTOS -->
<div id="fotos"></div>

<!-- FULLSCREEN -->
<div id="fullscreen" onclick="cerrarFull()">
<img id="imgFull">
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5492615573928" target="_blank">💬</a>

<script>
let galeriasData = JSON.parse(localStorage.getItem("galerias")) || {}
let actual = null

function login(){
if(document.getElementById("pass").value==="Lepra1913"){
document.getElementById("panel").style.display="block"
}
}

function crearGaleria(){
let nombre = prompt("Nombre cliente")
if(!nombre) return
galeriasData[nombre]=[]
guardar()
renderGalerias()
}

function subirFotos(e){
let archivos = e.target.files
let barra = document.getElementById("barra")
barra.innerHTML="Subiendo..."

let i=0
for(let file of archivos){
let reader = new FileReader()
reader.onload=function(ev){
galeriasData[actual].push(ev.target.result)
guardar()
renderFotos(actual)
i++
barra.innerHTML="Subidas: "+i+"/"+archivos.length
}
reader.readAsDataURL(file)
}
}

function guardar(){
localStorage.setItem("galerias", JSON.stringify(galeriasData))
}

function renderGalerias(){
let cont = document.getElementById("galerias")
cont.innerHTML=""
for(let g in galeriasData){
let div = document.createElement("div")
div.className="carpeta"
div.innerHTML=`📁 ${g}`
div.onclick=()=>abrirGaleria(g)
cont.appendChild(div)
}
}

function abrirGaleria(nombre){
actual = nombre
document.getElementById("fotos").style.display="grid"
renderFotos(nombre)
}

function renderFotos(nombre){
let cont = document.getElementById("fotos")
cont.innerHTML=""
galeriasData[nombre].forEach(f=>{
let div = document.createElement("div")
div.className="foto"
div.innerHTML=`
<img src="${f}" onclick="full('${f}')">
<div class="marca">FOTOS_SELE</div>
<a href="${f}" download>⬇</a>
`
cont.appendChild(div)
})
}

function full(src){
document.getElementById("fullscreen").style.display="flex"
document.getElementById("imgFull").src=src
}

function cerrarFull(){
document.getElementById("fullscreen").style.display="none"
}

function scrollGalerias(){
window.scrollTo({
top: window.innerHeight,
behavior:"smooth"
})
}

renderGalerias()
</script>

</body>
</html>
