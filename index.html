<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESCUDERO SELENE</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:'Poppins',sans-serif;}
nav{position:fixed;width:100%;top:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);display:flex;justify-content:space-between;padding:15px 30px;z-index:1000;}
nav a{color:white;text-decoration:none;margin:0 10px;}

.hero{height:100vh;background:url('https://picsum.photos/1600/900') center/cover;display:flex;align-items:center;justify-content:center;text-align:center;}
.hero h1{font-family:'Playfair Display';font-size:50px;}

.admin-btn{position:fixed;top:15px;left:15px;background:#111;padding:10px;cursor:pointer;}

.section{padding:60px 20px;text-align:center;}

.clientes{display:flex;gap:20px;padding:40px;overflow:auto;}
.cliente{background:#111;padding:20px;border-radius:10px;cursor:pointer;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;padding:20px;}
.img-box{position:relative;}
.img-box img{width:100%;border-radius:10px;}
.img-box::after{content:"@FOTOS_SELE";position:absolute;bottom:10px;right:10px;color:rgba(255,255,255,0.5);}
.descargar{position:absolute;top:10px;right:10px;background:black;padding:5px;cursor:pointer;}

.panel{display:none;position:fixed;width:100%;height:100%;background:black;top:0;left:0;padding:50px;}
input,select{padding:10px;margin:5px;}
button{padding:10px;margin:5px;background:#25D366;border:none;color:white;border-radius:5px;}

.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;padding:15px;border-radius:50%;}
</style>
</head>

<body>

<nav>
<div>ESCUDERO SELENE</div>
<div>
<a href="#">Inicio</a>
<a href="#galerias">Galerías</a>
</div>
</nav>

<div class="admin-btn" onclick="abrirPanel()">⚙</div>

<section class="hero">
<div>
<h1>ESCUDERO SELENE</h1>
<p>@FOTOS_SELE · FOTOGRAFÍA PROFESIONAL</p>
<button onclick="scrollTo('galerias')">Ver galerías</button>
</div>
</section>

<!-- GALERIAS -->
<section id="galerias" class="section">
<h2>Galerías</h2>
<div class="clientes" id="clientes"></div>
<div id="galeria" class="grid"></div>
</section>

<!-- PANEL -->
<div id="panel" class="panel">
<h2>Panel fotógrafo</h2>

<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>

<div id="admin" style="display:none;">
<input type="text" id="nombre" placeholder="Nombre cliente">
<select id="tipo">
<option value="publica">Pública</option>
<option value="privada">Privada</option>
</select>
<input type="text" id="clave" placeholder="Contraseña (si es privada)">
<br>
<input type="file" id="fotos" multiple>
<br>
<button onclick="crearGaleria()">Crear galería</button>
<button onclick="cerrarPanel()">Cerrar</button>
</div>
</div>

<a class="whatsapp" href="https://wa.me/5492615573928">💬</a>

<script>

let data = JSON.parse(localStorage.getItem("galerias")) || {};

function abrirPanel(){panel.style.display="block";}
function cerrarPanel(){panel.style.display="none";}

function login(){
if(pass.value==="Lepra1913"){
admin.style.display="block";
}
}

function crearGaleria(){
let n=nombre.value;
let t=tipo.value;
let c=clave.value;
let files=fotos.files;

if(!n||files.length===0)return alert("Faltan datos");

data[n]={tipo:t,clave:c,fotos:[]};

for(let f of files){
let r=new FileReader();
r.onload=(e)=>{
data[n].fotos.push(e.target.result);
guardar();
cargarClientes();
};
r.readAsDataURL(f);
}
}

function guardar(){
localStorage.setItem("galerias",JSON.stringify(data));
}

function cargarClientes(){
clientes.innerHTML="";
Object.keys(data).forEach(n=>{
let div=document.createElement("div");
div.className="cliente";
div.innerText=n + (data[n].tipo==="privada"?" 🔒":"");
div.onclick=()=>abrirGaleria(n);
clientes.appendChild(div);
});
}

function abrirGaleria(n){
if(data[n].tipo==="privada"){
let p=prompt("Contraseña");
if(p!==data[n].clave)return alert("Incorrecta");
}
verGaleria(n);
}

function verGaleria(n){
galeria.innerHTML="";
data[n].fotos.forEach(img=>{
let box=document.createElement("div");
box.className="img-box";

let image=document.createElement("img");
image.src=img;

let d=document.createElement("div");
d.className="descargar";
d.innerText="⬇";
d.onclick=()=>{
let a=document.createElement("a");
a.href=img;
a.download="foto.jpg";
a.click();
};

box.appendChild(d);
box.appendChild(image);
galeria.appendChild(box);
});
}

function scrollTo(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

cargarClientes();

</script>

</body>
</html>
