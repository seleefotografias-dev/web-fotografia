<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWm-PiD1rrslhKs01nHDvpbxuiWE22T2Q",
  authDomain: "fotografia-selene.firebaseapp.com",
  projectId: "fotografia-selene",
  storageBucket: "fotografia-selene.firebasestorage.app",
  messagingSenderId: "758063876891",
  appId: "1:758063876891:web:eeb76e4527919c194b61be",
  measurementId: "G-G5XMG5M1GF"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN PANEL
window.login = async function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    alert("Bienvenido panel PRO 🔥");
    document.getElementById("panel").style.display = "block";
  } catch (error) {
    alert("Error: " + error.message);
  }
};
</script>
<section id="login">
  <h2>Panel fotógrafo</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="pass" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
</section>

<section id="panel" style="display:none;">
  <h2>Panel PRO</h2>
  <p>Desde acá vas a poder subir fotos, editar y más</p>
</section>
