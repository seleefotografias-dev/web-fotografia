<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel PRO - ESCUDERO SELENE</title>

<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:sans-serif}

/* PANEL */
#login{position:absolute;top:10px;left:10px;z-index:1000}
#panel{display:none;padding:20px}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.btn{
background:#00c853;
border:none;
padding:10px 15px;
border-radius:8px;
color:#fff;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#111;
border-radius:10px;
overflow:hidden;
position:relative;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.menu{
position:absolute;
top:10px;
right:10px;
cursor:pointer;
}

.dropdown{
display:none;
position:absolute;
right:10px;
top:40px;
background:#222;
border-radius:8px;
overflow:hidden;
}

.dropdown div{
padding:10px;
cursor:pointer;
}

.dropdown div:hover{
background:#333;
}
</style>
</head>

<body>

<div id="login">
<input type="password" id="pass">
<button onclick="login()">Entrar</button>
</div>

<div id="panel">

<div class="header">
<h2>Colecciones</h2>
<button class="btn" onclick="crear()">+ Nueva colección</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("proDB")) || {}

function login(){
if(pass.value==="Lepra1913"){
panel.style.display="block"
render()
}
}

function crear(){
let nombre = prompt("Nombre colección")
if(!nombre) return

let id = Date.now()
db[id]={
nombre:nombre,
fotos:[],
fecha:new Date().toLocaleDateString()
}

guardar()
render()
}

function guardar(){
localStorage.setItem("proDB", JSON.stringify(db))
}

function render(){
grid.innerHTML=""

for(let id in db){
let g = db[id]

let preview = g.fotos[0] || "https://via.placeholder.com/300x200"

let card = document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="menu" onclick="toggleMenu('${id}')">⋮</div>

<div id="menu_${id}" class="dropdown">
<div onclick="abrir('${id}')">👁 Vista previa</div>
<div onclick="editar('${id}')">✏ Editar</div>
<div onclick="duplicar('${id}')">📄 Duplicar</div>
<div onclick="eliminar('${id}')">🗑 Eliminar</div>
<div onclick="compartir('${id}')">🔗 Compartir</div>
</div>

<img src="${preview}">
<div class="card-body">
<h3>${g.nombre}</h3>
<p>${g.fotos.length} fotos</p>
<p>${g.fecha}</p>
<input type="file" multiple onchange="subir(event,'${id}')">
</div>
`

grid.appendChild(card)
}
}

function toggleMenu(id){
let m = document.getElementById("menu_"+id)
m.style.display = m.style.display==="block"?"none":"block"
}

function subir(e,id){
let files = e.target.files
for(let f of files){
let r = new FileReader()
r.onload=ev=>{
db[id].fotos.push(ev.target.result)
guardar()
render()
}
r.readAsDataURL(f)
}
}

function abrir(id){
alert("Abrir galería cliente (modo público después)")
}

function editar(id){
let nuevo = prompt("Nuevo nombre", db[id].nombre)
if(nuevo){
db[id].nombre = nuevo
guardar()
render()
}
}

function duplicar(id){
let copia = JSON.parse(JSON.stringify(db[id]))
let newId = Date.now()
db[newId] = copia
guardar()
render()
}

function eliminar(id){
if(confirm("Eliminar galería?")){
delete db[id]
guardar()
render()
}
}

function compartir(id){
let link = location.href + "?galeria=" + id
navigator.clipboard.writeText(link)
alert("Link copiado")
}

</script>

</body>
</html>
