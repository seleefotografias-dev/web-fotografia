<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESCUDERO SELENE</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#000;
  color:#fff;
}

header{
  text-align:center;
  padding:60px 20px;
  background:url('https://picsum.photos/1200/500') center/cover;
}

header h1{
  font-size:40px;
  margin:0;
}

header p{
  opacity:0.8;
}

nav{
  text-align:center;
  padding:15px;
  background:#111;
}

nav a{
  color:white;
  margin:15px;
  text-decoration:none;
  font-weight:bold;
}

.galeria{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.galeria img{
  width:100%;
  border-radius:12px;
  transition:0.3s;
}

.galeria img:hover{
  transform:scale(1.05);
}

#login{
  text-align:center;
  padding:30px;
}

input{
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:none;
}

button{
  padding:10px 20px;
  background:#25D366;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

#panel{
  display:none;
  background:#111;
  padding:20px;
  text-align:center;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
}

.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:22px;
  text-decoration:none;
  color:white;
}
</style>
</head>

<body>

<header>
<h1>ESCUDERO SELENE 📸</h1>
<p>@FOTOS_SELE — PROFESIONAL</p>
</header>

<nav>
<a href="#">Inicio</a>
<a href="#">Galería</a>
<a href="#">Contacto</a>
</nav>

<section id="login">
<h2>Panel fotógrafo</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</section>

<section id="panel">
<h2>Panel PRO 🔥</h2>

<input type="file" id="file">
<button onclick="subirFoto()">Subir foto</button>

</section>

<section class="galeria" id="galeria"></section>

<footer>
© 2026 ESCUDERO SELENE
</footer>

<a class="whatsapp" href="https://wa.me/5492615573928">💬</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWm-PiD1rrslhKs01nHDvpbxuiWE22T2Q",
  authDomain: "fotografia-selene.firebaseapp.com",
  projectId: "fotografia-selene",
  storageBucket: "fotografia-selene.firebasestorage.app",
  messagingSenderId: "758063876891",
  appId: "1:758063876891:web:eeb76e4527919c194b61be"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const storage = getStorage(app);

window.login = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try{
    await signInWithEmailAndPassword(auth, email, pass);
    alert("Bienvenida Selene 🔥");
    document.getElementById("panel").style.display = "block";
    cargarFotos();
  }catch(e){
    alert("Error: "+e.message);
  }
}

window.subirFoto = async function(){
  const file = document.getElementById("file").files[0];
  const storageRef = ref(storage, "fotos/" + file.name);

  await uploadBytes(storageRef, file);
  alert("Foto subida 🔥");
  cargarFotos();
}

async function cargarFotos(){
  const galeria = document.getElementById("galeria");
  galeria.innerHTML = "";

  const listRef = ref(storage, "fotos/");
  const res = await listAll(listRef);

  for(const item of res.items){
    const url = await getDownloadURL(item);
    const img = document.createElement("img");
    img.src = url;
    galeria.appendChild(img);
  }
}

cargarFotos();
</script>

</body>
</html>
