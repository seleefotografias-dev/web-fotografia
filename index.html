<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESCUDERO SELENE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

/* PANEL ARRIBA IZQUIERDA */
.admin-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  background: #111;
  border: 1px solid #555;
  padding: 10px;
  cursor: pointer;
  z-index: 999;
}

/* HEADER */
header {
  text-align: center;
  padding: 60px 20px;
}

header h1 {
  font-size: 32px;
}

header p {
  color: #aaa;
}

/* CLIENTES */
.clientes {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding: 20px;
}

.cliente {
  min-width: 200px;
  background: #111;
  padding: 15px;
  cursor: pointer;
  border-radius: 10px;
  text-align: center;
}

.cliente:hover {
  background: #222;
}

/* GALERÍA */
.galeria {
  display: none;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 15px;
}

.img-box {
  position: relative;
}

.img-box img {
  width: 100%;
  border-radius: 10px;
}

/* MARCA DE AGUA */
.img-box::after {
  content: "@FOTOS_SELE";
  position: absolute;
  bottom: 10px;
  right: 10px;
  color: rgba(255,255,255,0.6);
  font-size: 14px;
}

/* BOTÓN DESCARGA */
.descargar {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #000;
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
}

/* PANEL LOGIN */
.panel {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  padding: 50px;
}

input {
  padding: 10px;
  margin: 5px;
}

button {
  padding: 10px;
  cursor: pointer;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="admin-btn" onclick="abrirPanel()">⚙</div>

<header>
<h1>ESCUDERO SELENE</h1>
<p>@FOTOS_SELE · PROFESIONAL</p>
</header>

<!-- CLIENTES -->
<div class="clientes">
  <div class="cliente" onclick="abrirGaleria('sofia')">15 Sofía</div>
  <div class="cliente" onclick="abrirGaleria('boda')">Boda Juan & Ana</div>
</div>

<!-- GALERÍA -->
<div id="sofia" class="galeria">
  <h2>15 Sofía</h2>
  <div class="grid">
    <div class="img-box">
      <a href="https://picsum.photos/1000" download>
        <div class="descargar">⬇</div>
      </a>
      <img src="https://picsum.photos/400?1">
    </div>

    <div class="img-box">
      <a href="https://picsum.photos/1000" download>
        <div class="descargar">⬇</div>
      </a>
      <img src="https://picsum.photos/400?2">
    </div>
  </div>
</div>

<div id="boda" class="galeria">
  <h2>Boda</h2>
  <div class="grid">
    <div class="img-box">
      <img src="https://picsum.photos/400?3">
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="panel" class="panel">
  <h2>Panel Fotógrafo PRO</h2>

  <input type="text" id="user" placeholder="Email">
  <input type="password" id="pass" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>

  <div id="panelContenido" style="display:none;">
    <h3>Subir fotos (simulado)</h3>
    <input type="file" multiple>
    <p>Acá después conectamos Firebase 🔥</p>
  </div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5492615573928">💬</a>

<script>
function abrirGaleria(id){
  document.querySelectorAll('.galeria').forEach(g=>g.style.display='none');
  document.getElementById(id).style.display='block';
}

function abrirPanel(){
  document.getElementById("panel").style.display="block";
}

function login(){
  let pass = document.getElementById("pass").value;

  if(pass === "1913"){
    document.getElementById("panelContenido").style.display = "block";
  } else {
    alert("Contraseña incorrecta");
  }
}
</script>

</body>
</html>
