<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWm-PiD1rrslhKs01nHDvpbxuiWE22T2Q",
  authDomain: "fotografia-selene.firebaseapp.com",
  projectId: "fotografia-selene",
  storageBucket: "fotografia-selene.firebasestorage.app",
  messagingSenderId: "758063876891",
  appId: "1:758063876891:web:eeb76e4527919c194b61be"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

// CARGAR IMÁGENES
async function loadImages() {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  const listRef = ref(storage);
  const res = await listAll(listRef);

  for (const item of res.items) {
    const url = await getDownloadURL(item);
    const img = document.createElement("img");
    img.src = url;
    gallery.appendChild(img);
  }
}

loadImages();

// SUBIR IMÁGENES
window.upload = async function () {
  const files = document.getElementById("fileInput").files;

  for (let file of files) {
    const storageRef = ref(storage, file.name);
    await uploadBytes(storageRef, file);
  }

  alert("Fotos subidas");
  loadImages();
};

</script>
